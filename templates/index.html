<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Newton Interpolation · Smart Calculator</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500;600&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
/* ══════════════════════════════════════════════════
   ROOT VARIABLES
══════════════════════════════════════════════════ */
:root {
  --bg:         #0B0F1A;
  --surface:    #111827;
  --surface2:   #1A2235;
  --surface3:   #1F2D42;
  --border:     rgba(255,255,255,0.08);
  --border2:    rgba(255,255,255,0.14);
  --primary:    #3B82F6;
  --primary-d:  #2563EB;
  --teal:       #14B8A6;
  --amber:      #F59E0B;
  --amber-d:    #D97706;
  --green:      #10B981;
  --red:        #EF4444;
  --text:       #F1F5F9;
  --text-2:     #94A3B8;
  --text-3:     #64748B;
  --radius:     16px;
  --radius-sm:  10px;
  --shadow:     0 8px 32px rgba(0,0,0,0.4);
  --shadow-lg:  0 20px 60px rgba(0,0,0,0.6);
  --fwd-color:  #3B82F6;
  --bwd-color:  #14B8A6;
  --poly-color: #A855F7;
}

/* ══════════════════════════════════════════════════
   RESET & BASE
══════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.6;
  overflow-x: hidden;
}

/* ── Background grid pattern ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(59,130,246,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(59,130,246,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

/* ══════════════════════════════════════════════════
   LAYOUT
══════════════════════════════════════════════════ */
.page-wrap {
  position: relative;
  z-index: 1;
  max-width: 1300px;
  margin: 0 auto;
  padding: 0 1.5rem 4rem;
}

/* ══════════════════════════════════════════════════
   HEADER
══════════════════════════════════════════════════ */
header {
  padding: 2.5rem 0 2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 1rem;
  border-bottom: 1px solid var(--border);
  margin-bottom: 2.5rem;
}
.brand {
  display: flex;
  align-items: center;
  gap: 1rem;
}
.brand-icon {
  width: 48px; height: 48px;
  background: linear-gradient(135deg, var(--primary), var(--teal));
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.4rem;
  box-shadow: 0 0 24px rgba(59,130,246,0.35);
}
.brand-text h1 {
  font-family: 'Playfair Display', serif;
  font-size: 1.55rem;
  font-weight: 700;
  letter-spacing: -0.3px;
  color: var(--text);
  line-height: 1.2;
}
.brand-text p {
  font-size: 0.78rem;
  color: var(--text-2);
  font-weight: 400;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.header-badges {
  display: flex;
  gap: 0.5rem;
  flex-wrap: wrap;
}
.hbadge {
  font-size: 0.72rem;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 4px 12px;
  border-radius: 30px;
  border: 1px solid;
}
.hbadge.fwd  { border-color: rgba(59,130,246,0.4);  color: var(--primary); background: rgba(59,130,246,0.1); }
.hbadge.bwd  { border-color: rgba(20,184,166,0.4);  color: var(--teal);    background: rgba(20,184,166,0.1); }
.hbadge.auto { border-color: rgba(245,158,11,0.4);  color: var(--amber);   background: rgba(245,158,11,0.1); }

/* ══════════════════════════════════════════════════
   TWO-COLUMN GRID
══════════════════════════════════════════════════ */
.main-grid {
  display: grid;
  grid-template-columns: 420px 1fr;
  gap: 1.5rem;
  align-items: start;
}
@media (max-width: 900px) {
  .main-grid { grid-template-columns: 1fr; }
}

/* ══════════════════════════════════════════════════
   CARD
══════════════════════════════════════════════════ */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.6rem;
  margin-bottom: 1.25rem;
  box-shadow: var(--shadow);
  transition: border-color 0.2s;
}
.card:hover { border-color: var(--border2); }
.card-header {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  margin-bottom: 1.2rem;
}
.card-icon {
  width: 32px; height: 32px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.95rem;
  flex-shrink: 0;
}
.card-icon.blue   { background: rgba(59,130,246,0.15);  color: var(--primary); }
.card-icon.teal   { background: rgba(20,184,166,0.15);  color: var(--teal);    }
.card-icon.amber  { background: rgba(245,158,11,0.15);  color: var(--amber);   }
.card-icon.purple { background: rgba(168,85,247,0.15);  color: #A855F7;        }
.card-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.0rem;
  font-weight: 600;
  color: var(--text);
}

/* ══════════════════════════════════════════════════
   FORM ELEMENTS
══════════════════════════════════════════════════ */
.field-label {
  font-size: 0.72rem;
  font-weight: 700;
  color: var(--text-3);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 0.45rem;
  display: block;
}
input[type="text"], input[type="number"] {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  padding: 0.7rem 1rem;
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.88rem;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  margin-bottom: 0.85rem;
}
input[type="text"]:focus, input[type="number"]:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
}
input[type="text"]::placeholder { color: var(--text-3); }
input[type="number"] { appearance: none; -moz-appearance: textfield; }

/* ══════════════════════════════════════════════════
   BUTTONS
══════════════════════════════════════════════════ */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
  padding: 0.65rem 1.2rem;
  border-radius: var(--radius-sm);
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-weight: 600;
  font-size: 0.88rem;
  cursor: pointer;
  border: none;
  transition: all 0.18s ease;
  white-space: nowrap;
}
.btn:hover { transform: translateY(-1px); }
.btn:active { transform: translateY(0); }
.btn-primary {
  background: linear-gradient(135deg, var(--primary), var(--primary-d));
  color: #fff;
  box-shadow: 0 4px 16px rgba(59,130,246,0.35);
  width: 100%;
  padding: 0.8rem;
  font-size: 0.95rem;
}
.btn-primary:hover { box-shadow: 0 6px 24px rgba(59,130,246,0.5); }
.btn-outline {
  background: transparent;
  border: 1px solid var(--border2);
  color: var(--text-2);
}
.btn-outline:hover { border-color: var(--primary); color: var(--primary); }
.btn-ghost {
  background: rgba(255,255,255,0.05);
  color: var(--text-2);
  font-size: 0.8rem;
  padding: 0.45rem 0.9rem;
}
.btn-ghost:hover { background: rgba(255,255,255,0.1); color: var(--text); }
.btn-amber {
  background: linear-gradient(135deg, var(--amber), var(--amber-d));
  color: #0B0F1A;
}
.btn-green {
  background: rgba(16,185,129,0.15);
  border: 1px solid rgba(16,185,129,0.3);
  color: var(--green);
  font-size: 0.8rem;
  padding: 0.4rem 0.85rem;
}
.btn-green:hover { background: rgba(16,185,129,0.25); }

.btn-row {
  display: flex;
  gap: 0.6rem;
  margin-top: 0.5rem;
}

/* ══════════════════════════════════════════════════
   SAMPLE SELECTOR
══════════════════════════════════════════════════ */
select {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  padding: 0.65rem 1rem;
  color: var(--text);
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 0.86rem;
  outline: none;
  cursor: pointer;
  margin-bottom: 0.75rem;
  transition: border-color 0.2s;
}
select:focus { border-color: var(--primary); }
.sample-desc {
  font-size: 0.78rem;
  color: var(--text-3);
  padding: 0.5rem 0.75rem;
  background: var(--surface2);
  border-radius: 6px;
  margin-bottom: 0.75rem;
  line-height: 1.5;
}

/* ══════════════════════════════════════════════════
   FORMULA REFERENCE
══════════════════════════════════════════════════ */
.formula-block {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-left: 3px solid var(--primary);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  padding: 1rem 1.2rem;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.82rem;
  color: var(--text-2);
  line-height: 2;
  margin-bottom: 0.75rem;
}
.formula-block.teal { border-left-color: var(--teal); }
.formula-block b { color: var(--primary); }
.formula-block.teal b { color: var(--teal); }

/* ══════════════════════════════════════════════════
   ALERT / INFO BOXES
══════════════════════════════════════════════════ */
.alert {
  border-radius: var(--radius-sm);
  padding: 0.8rem 1.1rem;
  font-size: 0.83rem;
  line-height: 1.6;
  margin-bottom: 1rem;
  display: none;
}
.alert.visible { display: block; }
.alert-error {
  background: rgba(239,68,68,0.1);
  border: 1px solid rgba(239,68,68,0.3);
  color: #FCA5A5;
}
.alert-warn {
  background: rgba(245,158,11,0.1);
  border: 1px solid rgba(245,158,11,0.3);
  color: #FCD34D;
}
.alert-info {
  background: rgba(59,130,246,0.1);
  border: 1px solid rgba(59,130,246,0.3);
  color: #93C5FD;
}

/* ══════════════════════════════════════════════════
   METHOD BADGE
══════════════════════════════════════════════════ */
.method-hero {
  border-radius: var(--radius);
  padding: 1.4rem 1.6rem;
  margin-bottom: 1.25rem;
  position: relative;
  overflow: hidden;
  display: none;
}
.method-hero.visible { display: block; }
.method-hero.forward {
  background: linear-gradient(135deg, rgba(37,99,235,0.25), rgba(29,78,216,0.15));
  border: 1px solid rgba(59,130,246,0.3);
}
.method-hero.backward {
  background: linear-gradient(135deg, rgba(13,148,136,0.25), rgba(15,118,110,0.15));
  border: 1px solid rgba(20,184,166,0.3);
}
.method-hero.polynomial {
  background: linear-gradient(135deg, rgba(124,58,237,0.25), rgba(109,40,217,0.15));
  border: 1px solid rgba(168,85,247,0.3);
}
.method-tag {
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 0.35rem;
}
.method-hero.forward  .method-tag { color: var(--primary); }
.method-hero.backward .method-tag { color: var(--teal); }
.method-hero.polynomial .method-tag { color: #A855F7; }
.method-name {
  font-family: 'Playfair Display', serif;
  font-size: 1.3rem;
  font-weight: 700;
  margin-bottom: 0.5rem;
}
